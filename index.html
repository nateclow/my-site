<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nate Clow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      display: flex;
      height: 100vh;
      background-color: #fefce8; /* Light Yellow Background */
      color: #333;
    }

    /* Sidebar Styling (Light Blue) */
    aside {
      width: 250px;
      background-color: #e0f2fe; /* Light Blue Background */
      padding: 2rem 1rem;
      box-shadow: 2px 0 5px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
    }

    aside h2 {
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0;
      margin-bottom: 1.5rem;
      color: #0f172a;
      padding-left: 1rem;
    }

    aside ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    aside li {
      margin-bottom: 0.5rem;
    }

    aside a {
      display: block;
      padding: 0.75rem 1rem;
      color: #1e293b;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.2s, color 0.2s;
    }

    aside a:hover {
      background-color: #bae6fd; /* Slightly darker blue on hover */
      color: #0c4a6e;
    }

    /* Main Content Styling */
    main {
      flex: 1;
      padding: 4rem;
      overflow-y: auto;
    }

    main h1 {
      font-size: 3rem;
      margin-top: 0;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    main p {
      font-size: 1.2rem;
      line-height: 1.6;
      max-width: 800px;
      color: #475569;
    }
  </style>
</head>
<body>

  <aside>
    <h2>Directory</h2>
    <ul>
      <li><a href="mailto:nateclow@hotmail.com">Email</a></li>
      <li><a href="https://www.linkedin.com/in/nate-clow-a86739290">LinkedIn</a></li>
    </ul>
  </aside>

  <main>
    <h1>Nate Clow</h1>
    <p><strong>Mathematics and Economics Student · Researcher</strong></p>
    <p>Welcome to my personal site. Feel free to use the directory on the left to view my work, check out my resume, or get in touch.</p>
  </main>

</body>
</html>
